name = "bp-witness-plugin"
predicates = ["battery_pack(cli)"]

[[installations]]
name = "bp-checker"
# Script generated at runtime by the test — returns witness JSON
# naming bp-crate so that source.path = "skills" resolution picks it up.
executable = "$TEST_DIR/bp-checker.sh"

[[predicate]]
name = "battery_pack"
command = "bp-checker"

[[skills]]
source.path = "skills"
